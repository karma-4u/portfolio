<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individual Components | RAYZ.SYS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --neon-green: #39ff14;
            --neon-orange: #ff9d00;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
        }

        @keyframes cyan-pulse {
            0% {
                box-shadow: 0 0 5px var(--neon-cyan);
            }

            50% {
                box-shadow: 0 0 20px var(--neon-cyan);
            }

            100% {
                box-shadow: 0 0 5px var(--neon-cyan);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: var(--glass-border);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-family: 'Orbitron';
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--neon-cyan);
        }

        /* --- Cart Icon --- */
        .cart-icon {
            position: relative;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--neon-cyan);
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--neon-purple);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
            font-family: 'Orbitron';
        }

        /* --- Shop Section --- */
        .shop-section {
            padding: 120px 5% 60px;
            min-height: 100vh;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-family: 'Orbitron';
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(180deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Filtering Bar --- */
        .filters-bar {
            background: var(--glass-bg);
            border: var(--glass-border);
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: space-between;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .filter-group label {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--neon-cyan);
        }

        select,
        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.8rem 1.2rem;
            border-radius: 5px;
            font-family: 'Rajdhani';
            outline: none;
        }

        .category-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .category-btn.active,
        .category-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.1);
        }

        /* --- Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            transition: 0.4s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .product-card:hover::after {
            display: none;
        }

        .product-img {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .product-info h3 {
            font-family: 'Orbitron';
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .product-info p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-family: 'Orbitron';
            font-size: 1.2rem;
            color: var(--neon-cyan);
        }

        .buy-btn {
            background: var(--neon-purple);
            color: #fff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            font-family: 'Orbitron';
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* --- Cart Sidebar --- */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            height: 100%;
            background: #0a0a0a;
            border-left: 1px solid var(--neon-purple);
            z-index: 2000;
            padding: 2rem;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: var(--glass-border);
            padding-bottom: 1rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 3px solid var(--neon-cyan);
        }

        footer {
            background: #020202;
            padding: 4rem 5%;
            border-top: var(--glass-border);
            text-align: center;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo-text">RAYZ<span style="color:var(--neon-cyan)">.SYS</span></div>
        <ul class="nav-links">
            <a href="e-commerce.html">HOME</a>
            <a href="javascript:void(0)" onclick="checkAuthAndBuild()">SYS CONFIG</a>
            <a href="components.html">COMPONENTS</a>
            <a href="orders.html" id="ordersLink" style="display:none;">ORDERS</a>
            <div id="authLink">
                <a href="auth.html">LOGIN</a>
            </div>
        </ul>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count">0</span>
        </div>
    </nav>

    <section class="shop-section">
        <div class="section-header">
            <h2>INDIVIDUAL COMPONENTS</h2>
            <p style="color:var(--neon-cyan); letter-spacing:3px;">1000+ PREMIUM PARTS READY FOR SHIPMENT</p>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label>GLOBAL SEARCH</label>
                <input type="text" id="globalSearch" placeholder="Search anything..." onkeyup="handleGlobalSearch()">
            </div>

            <div class="filter-group">
                <label>SORT BY</label>
                <select id="sortPrice" onchange="sortComponents(this.value)">
                    <option value="default">Default</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                </select>
            </div>

            <div class="filter-group">
                <label>CATEGORIES</label>
                <div class="category-btns" id="categoryFilters">
                    <button class="category-btn active" onclick="filterByCategory('ALL')">ALL</button>
                    <button class="category-btn" onclick="filterByCategory('GPU')">GPU</button>
                    <button class="category-btn" onclick="filterByCategory('CPU')">CPU</button>
                    <button class="category-btn" onclick="filterByCategory('RAM')">RAM</button>
                    <button class="category-btn" onclick="filterByCategory('SSD')">SSD</button>
                    <button class="category-btn" onclick="filterByCategory('MOBO')">MOBO</button>
                    <button class="category-btn" onclick="filterByCategory('PSU')">PSU</button>
                </div>
            </div>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Items injected via JS -->
        </div>
        <div id="gridStatus" style="text-align:center; margin-top:3rem; color:#666;"></div>
    </section>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>YOUR ORDER</h3>
            <i class="fas fa-times" style="cursor:pointer;" onclick="toggleCart()"></i>
        </div>
        <div class="cart-items" id="cartItems"></div>

        <div class="checkout-area" style="margin-top:1.5rem; border-top:1px solid #333; padding-top:1rem;">
            <div style="margin-bottom:1rem;">
                <label style="font-size:0.8rem; color:#888;">COUNTRY / REGION</label>
                <input type="text" id="shippingCountry" value="Pakistan" disabled
                    style="width:100%; padding:8px; background:#080808; border:1px solid #222; color:#555; border-radius:5px; margin-top:5px;">
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:1rem;">
                <div>
                    <label style="font-size:0.8rem; color:#888;">DISTRICT</label>
                    <input type="text" id="shippingDistrict" placeholder="e.g. South"
                        style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; margin-top:5px;">
                </div>
                <div>
                    <label style="font-size:0.8rem; color:#888;">CITY</label>
                    <select id="shippingCity" onchange="updateCartUI()"
                        style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; margin-top:5px;">
                        <option value="Karachi">Karachi</option>
                        <option value="Lahore">Lahore</option>
                        <option value="Islamabad">Islamabad</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom:1rem;">
                <label style="font-size:0.8rem; color:#888;">HOUSE # / STREET / AREA</label>
                <textarea id="shippingAddress" placeholder="House 123, Street 4, Phase 5..."
                    style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; margin-top:5px; height:60px; font-family:inherit;"></textarea>
            </div>

            <div style="margin-bottom:1rem;">
                <label style="font-size:0.8rem; color:#888;">PHONE NUMBER</label>
                <input type="tel" id="shippingContact" placeholder="+92 3XX XXXXXXX"
                    style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; margin-top:5px;">
            </div>

            <div style="margin-bottom:1rem;">
                <label style="font-size:0.8rem; color:#888;">LANDMARK / OTHER</label>
                <input type="text" id="shippingLandmark" placeholder="Near Cyber Tower..."
                    style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; margin-top:5px;">
            </div>

            <div style="margin-bottom:1rem;">
                <label style="font-size:0.8rem; color:#888;">PAYMENT METHOD</label>
                <select id="paymentMethod" onchange="updateCartUI()"
                    style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff; border-radius:5px; margin-top:5px;">
                    <option value="COD">Cash on Delivery</option>
                    <option value="Bank">Bank Transfer (5% Discount)</option>
                    <option value="Card">Credit/Debit Card</option>
                </select>
            </div>
            <div id="cartTotal" style="font-weight:700; color:var(--neon-cyan);">Total: Rs. 0</div>
            <button class="buy-btn" style="width:100%; margin-top:1rem;" onclick="placeOrder()">CONFIRM
                PURCHASE</button>
        </div>

        <footer>
            <div class="logo-text" style="font-size:1.5rem;">RAYZ<span style="color:var(--neon-purple)">.SYS</span>
            </div>
            <p style="color:#666; margin-top:1rem;">&copy; 2026 Rayz Games Pakistan. Designed for Gamers.</p>
        </footer>

        <script>
            const individualProducts = [
                { id: 101, name: "ASUS ROG Strix RTX 4090", desc: "The ultimate gaming GPU", price: 620000, type: "GPU", img: "https://images.unsplash.com/photo-1591488320449-011701bb6704?auto=format&fit=crop&w=500&q=60" },
                { id: 102, name: "Logitech G Pro X Superlight", desc: "Wireless Gaming Mouse", price: 38000, type: "PERIPHERAL", img: "https://images.unsplash.com/photo-1527814050087-3793815479db?auto=format&fit=crop&w=500&q=60" },
                { id: 103, name: "SteelSeries Apex Pro", desc: "Mechanical Keyboard", price: 55000, type: "PERIPHERAL", img: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?auto=format&fit=crop&w=500&q=60" },
                { id: 104, name: "Samsung Odyssey G9", desc: "49-inch Curved Monitor", price: 350000, type: "DISPLAY", img: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?auto=format&fit=crop&w=500&q=60" }
            ];

            let cart = JSON.parse(localStorage.getItem('rayz_cart')) || [];

            function saveCart() {
                localStorage.setItem('rayz_cart', JSON.stringify(cart));
            }

            function generateInventory() {
                const brands = ["ASUS", "MSI", "Gigabyte", "Zotac", "Corsair", "Samsung", "NZXT"];
                const types = ["GPU", "CPU", "RAM", "SSD", "MOBO", "PSU", "COOLER", "CASE", "PERIPHERAL"];
                for (let i = 0; i < 1500; i++) {
                    const type = types[Math.floor(Math.random() * types.length)];
                    const brand = brands[Math.floor(Math.random() * brands.length)];
                    individualProducts.push({
                        id: 3000 + i,
                        name: `${brand} Pro ${type} v${i + 1}`,
                        desc: `High-performance ${type} for elite builds.`,
                        price: 15000 + Math.floor(Math.random() * 200000),
                        type: type,
                        img: "https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?auto=format&fit=crop&w=500&q=60"
                    });
                }
            }

            function formatPKR(num) { return 'Rs. ' + num.toLocaleString(); }

            function renderProductGrid(products) {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';
                const limit = 50;
                products.slice(0, limit).forEach(p => {
                    const inStock = p.inStock !== false;
                    grid.innerHTML += `
                    <div class="product-card" style="opacity:${inStock ? 1 : 0.6}">
                        <div class="product-img" style="background-image: url('${p.img}')"></div>
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p>${p.desc}</p>
                            <div class="price-row">
                                <span class="price">${formatPKR(p.price)}</span>
                                ${inStock ?
                            `<button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">ADD TO BASKET</button>` :
                            `<button class="add-btn" style="background:#333; cursor:not-allowed;" disabled>OUT OF ORDER</button>`
                        }
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById('gridStatus').innerText = products.length > limit ? `Showing top ${limit} of ${products.length} items.` : '';
            }

            function filterByCategory(type) {
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === type));
                const filtered = type === 'ALL' ? individualProducts : individualProducts.filter(p => p.type === type);
                renderProductGrid(filtered);
            }

            function sortComponents(criteria) {
                const activeBtn = document.querySelector('.category-btn.active');
                const type = activeBtn ? activeBtn.innerText : 'ALL';
                let list = type === 'ALL' ? [...individualProducts] : individualProducts.filter(p => p.type === type);
                if (criteria === 'price-asc') list.sort((a, b) => a.price - b.price);
                else if (criteria === 'price-desc') list.sort((a, b) => b.price - a.price);
                renderProductGrid(list);
            }

            function handleGlobalSearch() {
                const val = document.getElementById('globalSearch').value.toLowerCase();
                const filtered = individualProducts.filter(p => p.name.toLowerCase().includes(val) || p.type.toLowerCase().includes(val));
                renderProductGrid(filtered);
            }

            function addToCart(name, price) {
                cart.push({ name, price });
                saveCart();
                updateCartUI();
                if (!document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
            }

            function removeCartItem(idx) {
                cart.splice(idx, 1);
                saveCart();
                updateCartUI();
            }

            function updateCartUI() {
                const list = document.getElementById('cartItems');
                if (!list) return;
                list.innerHTML = '';
                let subtotal = 0;
                cart.forEach((item, idx) => {
                    subtotal += item.price;
                    list.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-header">
                            <span>${item.name}</span>
                            <i class="fas fa-times" style="color:#ff3c00; cursor:pointer;" onclick="removeCartItem(${idx})"></i>
                        </div>
                        <div class="cart-item-detail">
                            <span>Unit 01</span>
                            <span>${formatPKR(item.price)}</span>
                        </div>
                    </div>`;
                });

                const shippingCosts = { 'Karachi': 300, 'Lahore': 500, 'Islamabad': 500, 'Other': 800 };
                const selectedCity = document.getElementById('shippingCity').value;
                const shippingFee = cart.length > 0 ? shippingCosts[selectedCity] : 0;

                const paymentMethodSelect = document.getElementById('paymentMethod');
                const paymentMethod = paymentMethodSelect ? paymentMethodSelect.value : 'COD';

                let total = subtotal + shippingFee;
                let discountNote = "";

                if (paymentMethod === 'Bank' && total > 0) {
                    const discount = total * 0.05;
                    total -= discount;
                    discountNote = `<div style="font-size:0.8rem; color:var(--neon-green);">Bank Transfer Discount (5%) Applied!</div>`;
                }

                document.getElementById('cartTotal').innerHTML = `Total: ${formatPKR(total)} ${discountNote}`;
                document.querySelector('.cart-count').innerText = cart.length;
            }

            function toggleCart() {
                document.getElementById('cartSidebar').classList.toggle('active');
                if (document.getElementById('cartSidebar').classList.contains('active')) updateCartUI();
            }
            async function placeOrder() {
                if (cart.length === 0) { alert('Your basket is empty!'); return; }

                const user = JSON.parse(localStorage.getItem('rayz_user'));
                if (!user) {
                    sessionStorage.setItem('redirectAfterLogin', window.location.href);
                    alert('AUTHENTICATION REQUIRED: Please login to buy these components.');
                    window.location.href = 'auth.html';
                    return;
                }

                const orderData = {
                    user: user.email,
                    items: cart,
                    address: document.getElementById('shippingAddress').value,
                    district: document.getElementById('shippingDistrict').value,
                    city: document.getElementById('shippingCity').value,
                    contact: document.getElementById('shippingContact').value,
                    landmark: document.getElementById('shippingLandmark').value,
                    payment: document.getElementById('paymentMethod').value,
                    timestamp: new Date().toISOString()
                };

                if (!orderData.address || !orderData.contact || !orderData.district) {
                    alert('CRITICAL: Complete all shipping data to proceed.');
                    return;
                }

                if (!orderData.address || !orderData.contact || !orderData.district) {
                    alert('CRITICAL: Complete all shipping data to proceed.');
                    return;
                }

                try {
                    const response = await fetch('http://localhost:3000/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(orderData)
                    });

                    if (response.ok) {
                        alert('Order Received! Thank you for choosing RAYZ.SYS.');
                        cart = [];
                        saveCart();
                        updateCartUI();
                        toggleCart();
                    } else {
                        alert('Order failed to sync with server.');
                    }
                } catch (err) {
                    alert('Offline Mode: Order received locally.');
                    cart = [];
                    saveCart();
                    updateCartUI();
                    toggleCart();
                }
            }

            function checkAuthAndBuild() {
                window.location.href = 'configurator.html';
            }

            function updateAuthUI() {
                const user = localStorage.getItem('rayz_user');
                const authLink = document.getElementById('authLink');
                const ordersLink = document.getElementById('ordersLink');
                if (user) {
                    const userData = JSON.parse(user);
                    let adminHtml = userData.role === 'admin' ? `<a href="admin.html" style="color:var(--neon-purple); margin-right:15px;">ADMIN</a>` : '';
                    authLink.innerHTML = `${adminHtml}<a href="javascript:void(0)" onclick="logout()" style="color:var(--neon-orange);">LOGOUT (${userData.name})</a>`;
                    if (ordersLink) ordersLink.style.display = 'inline-block';
                } else {
                    authLink.innerHTML = `<a href="auth.html">LOGIN</a>`;
                    if (ordersLink) ordersLink.style.display = 'none';
                }
            }

            function logout() {
                localStorage.removeItem('rayz_user');
                window.location.href = 'e-commerce.html';
            }

            window.onload = () => { generateInventory(); renderProductGrid(individualProducts); updateAuthUI(); };
        </script>
</body>

</html>
